<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8>"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STP Spiel</title>
    <link rel="stylesheet" href="style.css" type="text/css" />
</head>
<body>
    <header>
        <h1>Schere, Stein, Papier</h1>
    </header>
    <div class="score">
        <div id="user-label" class="badge">User</div>
        <div id="computer-label" class="badge">Comp</div>
        <span id="user-score">0</span> : <span id="computer-score">0</span>
    </div>
    <div class="result">
        <p>Das Ergebnis</p>
    </div>
    <div class="choices">
        <div id="scissors" class="choice">
            <img width="48" height="48" src="1.png" />
        </div>
        <div id="rock" class="choice">
            <img width="48" height="48" src="2.png" />
        </div>
        <div id="paper" class="choice">
            <img width="48" height="48" src="3.png" />
        </div>
        <p id="action-message">Wähle..</p>
    </div>
    <script src="main.js" type="text/javascript"></script>
</body>
</html>
